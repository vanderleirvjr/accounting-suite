version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: paytracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: payuser
      POSTGRES_PASSWORD: paypass
      POSTGRES_DB: paydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payuser -d paydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: paytracker-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://payuser:paypass@db:5432/paydb
    ports:
      - "8000:8000"
    volumes:
      - .:/app        # live reload during development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
    name: paytracker-pgdata
