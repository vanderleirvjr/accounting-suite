<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · PayTracker</title>
  <style>
    :root {
      --bg0: #0b1020;
      --bg1: #151b2e;
      --card: #1b2238;
      --line: #2f3a62;
      --text: #e7ebff;
      --text2: #95a0c8;
      --accent: #4f8ef7;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, #26345f 0%, transparent 30%),
        radial-gradient(circle at 88% 88%, #1b445a 0%, transparent 25%),
        linear-gradient(140deg, var(--bg0), var(--bg1));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }
    .title {
      margin: 0 0 8px;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .subtitle {
      margin: 0 0 20px;
      color: var(--text2);
      font-size: 0.95rem;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--text2);
      font-size: 0.9rem;
    }
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      background: #1f2742;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
    }
    .field input:focus { outline: 2px solid #3b79e6; border-color: transparent; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      background: linear-gradient(135deg, #4f8ef7, #366fcb);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 6px;
    }
    .error {
      color: var(--danger);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .switch {
      margin-top: 14px;
      color: var(--text2);
      font-size: 0.9rem;
    }
    .switch a {
      color: #7fb6ff;
      text-decoration: none;
    }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Login</h1>
    <p class="subtitle">Sign in to continue to PayTracker.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
